services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      POSTGRES_URL: postgresql://admin:admin123@postgres:5432/coding_platform
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ""
      VITE_DEV_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: coding_platform
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
